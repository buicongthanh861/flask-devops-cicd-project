name: Production-Grade CI/CD Pipeline

on:
  push:
    branches: [ master ]


permissions:
  contents: write

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 
      
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Run Bandit SAST
        run: |
          pip install bandit
          bandit -r . -ll -ii --exclude .venv,tests

      - name: Run Linting
        run: flake8 --ignore=E501,F401 .

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=buicongthanh861_Flask-App-GitHub-Actions-ArgoCD
            -Dsonar.organization=java-woof
            -Dsonar.host.url=https://sonarcloud.io

  build-and-push:
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            congthanh19/demo-app:${{ github.sha }}
            congthanh19/demo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
      needs: build-and-push
      runs-on: ubuntu-latest
      steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
          
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in Kustomize
        run: | 
          cd deploy
          kustomize edit set image congthanh19/demo-app=congthanh19/demo-app:${{ github.sha }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Skip CI để tránh lặp vô tận khi bot commit lên chính repo này
          git diff --staged --quiet || (git commit -m "chore: update image to ${{ github.sha }} [skip ci]" && git push)