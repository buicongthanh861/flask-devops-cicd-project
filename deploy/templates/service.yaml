apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.microservice.name }}-service
  namespace: {{ .Values.microservice.namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.microservice.name }}
  ports:
    - port: 80          # port Service
      targetPort: {{ .Values.workload.port }}  # port trong container