apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flask-app-rules
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  groups:
    - name: flask-app
      rules:
        - record: job:node_cpu_seconds:usage_percentage
          expr: 1 - avg without(cpu, mode) (rate(node_cpu_seconds_total{mode="idle"}[5m]))
        - record: job:flask_http_request:rate5m
          expr: sum(rate(http_request_duration_seconds_count[5m])) by (pod, handler)
        - alert: HighCPUUsage
          expr: job:node_cpu_seconds:usage_percentage > 0.8
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: High CPU usage detected 
            description: "CPU usage is above 80% for more than 1 minute "
